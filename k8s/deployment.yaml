apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubeflowx-deployment
  labels:
    app: kubeflowx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kubeflowx
  template:
    metadata:
      labels:
        app: kubeflowx
    spec:
      containers:
      - name: kubeflowx
        image: kubeflowx:latest
        ports:
        - containerPort: 8000
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 5